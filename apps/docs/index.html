<!doctype html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wiss</title>

    <!-- Solo para esta vista rápida: Tailwind vía Play CDN (JIT en el navegador,
         detecta clases inyectadas dinámicamente por wiss sin config extra) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: 'class' };
    </script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-6 text-zinc-900 dark:text-zinc-100 relative"
  >
    <div class="absolute inset-0 -z-10 h-full w-full bg-white dark:bg-zinc-950 transition-colors">
      <div class="absolute h-full w-full bg-[radial-gradient(#e5e7eb_1px,transparent_1px)] dark:bg-[radial-gradient(#3f3f46_1px,transparent_1px)] [background-size:16px_16px] [mask-image:radial-gradient(ellipse_50%_50%_at_50%_50%,#000_70%,transparent_100%)]"></div>
    </div>
    <main class="w-full max-w-md space-y-6 text-center">
      <div>
        <h1 class="text-3xl font-bold text-zinc-800 dark:text-zinc-100">wiss</h1>
        <p class="mt-1 text-sm text-zinc-600 dark:text-zinc-400">
          Preview rápido de los toasts — dale clic a los botones.
        </p>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <button
          id="btn-success"
          data-cuelume-press data-cuelume-release data-cuelume-hover="tick"
          class="rounded-xl bg-emerald-500 px-4 py-2 font-medium text-white transition hover:bg-emerald-600"
        >
          Success
        </button>
        <button
          id="btn-error"
          data-cuelume-press data-cuelume-release data-cuelume-hover="tick"
          class="rounded-xl bg-red-500 px-4 py-2 font-medium text-white transition hover:bg-red-600"
        >
          Error
        </button>
        <button
          id="btn-warning"
          data-cuelume-press data-cuelume-release data-cuelume-hover="tick"
          class="rounded-xl bg-amber-500 px-4 py-2 font-medium text-white transition hover:bg-amber-600"
        >
          Warning
        </button>
        <button
          id="btn-info"
          data-cuelume-press data-cuelume-release data-cuelume-hover="tick"
          class="rounded-xl bg-blue-500 px-4 py-2 font-medium text-white transition hover:bg-blue-600"
        >
          Info
        </button>
        <button
          id="btn-action"
          data-cuelume-press data-cuelume-release data-cuelume-hover="tick"
          class="rounded-xl bg-zinc-700 px-4 py-2 font-medium text-white transition hover:bg-zinc-600"
        >
          Action
        </button>
        <button
          id="btn-promise"
          data-cuelume-press data-cuelume-release data-cuelume-hover="tick"
          class="rounded-xl bg-violet-500 px-4 py-2 font-medium text-white transition hover:bg-violet-600"
        >
          Promise
        </button>
      </div>

      <div class="flex gap-2 w-full">
        <button
          id="btn-theme"
          data-cuelume-press data-cuelume-release data-cuelume-hover="tick"
          class="flex-1 rounded-xl border border-zinc-300 px-4 py-2 text-sm text-zinc-700 transition hover:bg-zinc-200/50 dark:border-zinc-700 dark:text-zinc-300 dark:hover:bg-zinc-800/50"
        >
          Tema: <span id="theme-label">auto</span>
        </button>
        <button
          id="btn-theme-island"
          data-cuelume-press data-cuelume-release data-cuelume-hover="tick"
          class="flex-1 rounded-xl border border-zinc-300 px-4 py-2 text-sm text-zinc-700 transition hover:bg-zinc-200/50 dark:border-zinc-700 dark:text-zinc-300 dark:hover:bg-zinc-800/50"
        >
          Formato: <span id="format-label">clásico</span>
        </button>
      </div>

      <div class="flex gap-2 w-full">
        <button
          id="btn-page-theme"
          data-cuelume-press data-cuelume-release data-cuelume-hover="tick"
          class="flex-1 rounded-xl border border-zinc-300 px-4 py-2 text-sm text-zinc-700 transition hover:bg-zinc-200/50 dark:border-zinc-700 dark:text-zinc-300 dark:hover:bg-zinc-800/50"
        >
          Fondo: <span id="page-theme-label">light</span>
        </button>
        <button
          id="btn-progress"
          data-cuelume-press data-cuelume-release data-cuelume-hover="tick"
          class="flex-1 rounded-xl border border-zinc-300 px-4 py-2 text-sm text-zinc-700 transition hover:bg-zinc-200/50 dark:border-zinc-700 dark:text-zinc-300 dark:hover:bg-zinc-800/50"
        >
          Progreso: <span id="progress-label">Oculto</span>
        </button>
      </div>

      <div class="flex gap-2 w-full">
        <button
          id="btn-replace"
          data-cuelume-press data-cuelume-release data-cuelume-hover="tick"
          class="flex-1 rounded-xl border border-zinc-300 px-4 py-2 text-sm text-zinc-700 transition hover:bg-zinc-200/50 dark:border-zinc-700 dark:text-zinc-300 dark:hover:bg-zinc-800/50"
        >
          Reemplazo: <span id="replace-label">normal</span>
        </button>
        <button
          id="btn-history-toggle"
          data-cuelume-press data-cuelume-release data-cuelume-hover="tick"
          class="flex-1 rounded-xl border border-zinc-300 px-4 py-2 text-sm text-zinc-700 transition hover:bg-zinc-200/50 dark:border-zinc-700 dark:text-zinc-300 dark:hover:bg-zinc-800/50"
        >
          Historial: <span id="history-toggle-label">Activo</span>
        </button>
      </div>

      <div class="flex gap-2 w-full mt-2">
        <button
          id="btn-limit"
          data-cuelume-press data-cuelume-release data-cuelume-hover="tick"
          class="flex-1 rounded-xl border border-zinc-300 px-4 py-2 text-sm text-zinc-700 transition hover:bg-zinc-200/50 dark:border-zinc-700 dark:text-zinc-300 dark:hover:bg-zinc-800/50"
        >
          Límite: <span id="limit-label">1</span>
        </button>
      </div>

      <!-- History Section -->
      <div class="mt-8 rounded-2xl border border-zinc-200 bg-white/50 p-6 shadow-sm backdrop-blur-xl dark:border-zinc-800 dark:bg-zinc-900/50 text-left">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-semibold text-zinc-800 dark:text-zinc-100 flex items-center gap-2">
            Historial <span id="history-count" class="text-xs bg-zinc-200 dark:bg-zinc-800 px-2 py-0.5 rounded-full">0</span>
          </h2>
          <button id="btn-clear-history" class="text-xs text-red-500 hover:text-red-600 font-medium transition">Borrar historial</button>
        </div>
        <ul id="history-list" class="space-y-2 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
          <li class="text-sm text-zinc-500 dark:text-zinc-400 italic text-center py-4">No hay notificaciones en el historial.</li>
        </ul>
      </div>

    </main>

    <style>
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #cbd5e1;
        border-radius: 10px;
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #3f3f46;
      }
    </style>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
