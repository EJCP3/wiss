<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wiss</title>
    <link rel="stylesheet" href="/src/styles/wiss.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: #ffffff;
        font-family: system-ui, -apple-system, sans-serif;
        color: #18181b;
      }
      h1 {
        font-size: 15px;
        font-weight: 500;
        color: #52525b;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        max-width: 480px;
      }
      .controls button {
        appearance: none;
        border: 1px solid #d4d4d8;
        background: #f4f4f5;
        color: #18181b;
        padding: 8px 14px;
        border-radius: 10px;
        font-size: 13px;
        cursor: pointer;
      }
      .controls button:hover {
        background: #e4e4e7;
      }
      .hint {
        max-width: 420px;
        font-size: 12px;
        color: #71717a;
        text-align: center;
        line-height: 1.5;
      }
      #viewport {
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        pointer-events: none;
      }
      #viewport [data-wiss-toast] {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <h1>wiss</h1>

    <div class="controls">
      <button id="btn-success-plain">Success (sin descripción)</button>
      <button id="btn-success">Success + descripción</button>
      <button id="btn-warning">Warning</button>
      <button id="btn-error">Error</button>
      <button id="btn-clear">Limpiar todo</button>
    </div>

    <p class="hint">
      Pasa el mouse por encima de un toast para expandirlo/colapsarlo. Los que
      tienen descripción también se auto-expanden solos poco después de
      aparecer y se vuelven a colapsar unos segundos después, sin necesidad
      de hover.
    </p>

    <div id="viewport"></div>

    <script type="module" src="./sileo-test.ts"></script>
  </body>
</html>
